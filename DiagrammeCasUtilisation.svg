<!-- DIAGRAMME DE CAS D'UTILISATION - HELP'OPS V1 -->
<!-- Format: SVG -->
<!-- À ouvrir dans un navigateur ou éditeur SVG -->

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <style>
      .background { fill: #f5f5f5; }
      .border { stroke: #333; stroke-width: 2; fill: none; }
      .actor-box { fill: #FFF9C4; stroke: #F57F17; stroke-width: 2; }
      .usecase-ellipse { fill: #E1F5FE; stroke: #01579B; stroke-width: 2; }
      .system-rect { fill: none; stroke: #01579B; stroke-width: 2; }
      .text-actor { font-size: 14px; font-weight: bold; text-anchor: middle; }
      .text-usecase { font-size: 13px; text-anchor: middle; font-family: Arial; }
      .text-title { font-size: 20px; font-weight: bold; text-anchor: middle; fill: #01579B; }
      .text-description { font-size: 11px; text-anchor: middle; fill: #666; }
      .text-note { font-size: 10px; fill: #333; }
      .line { stroke: #333; stroke-width: 2; fill: none; }
      .line-include { stroke: #01579B; stroke-width: 1.5; stroke-dasharray: 5,5; fill: none; marker-end: url(#arrowInclude); }
      .line-assoc { stroke: #333; stroke-width: 2; fill: none; }
    </style>
    
    <!-- Définition des flèches -->
    <marker id="arrowAssoc" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    
    <marker id="arrowInclude" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#01579B" />
    </marker>
  </defs>
  
  <!-- Fond -->
  <rect width="1200" height="800" class="background"/>
  
  <!-- Titre -->
  <text x="600" y="35" class="text-title">DIAGRAMME DE CAS D'UTILISATION - HELP'OPS V1</text>
  <text x="600" y="55" class="text-description">Plateforme de Gestion d'Incidents - Version 1</text>
  
  <!-- Cadre du système -->
  <rect x="250" y="100" width="700" height="600" class="system-rect"/>
  <text x="600" y="120" class="text-description" font-weight="bold" fill="#01579B">HELP'OPS SYSTEM</text>
  
  <!-- ACTEUR: UTILISATEUR (à gauche) -->
  <circle cx="100" cy="350" r="30" class="actor-box"/>
  <text x="100" y="390" class="text-actor" font-size="12">UTILISATEUR</text>
  
  <!-- CAS D'UTILISATION 1: S'AUTHENTIFIER -->
  <ellipse cx="450" cy="180" rx="90" ry="50" class="usecase-ellipse"/>
  <text x="450" y="175" class="text-usecase">S'Authentifier</text>
  <text x="450" y="190" class="text-usecase" font-size="11">(UC-001)</text>
  
  <!-- CAS D'UTILISATION 2: DÉCLARER INCIDENT -->
  <ellipse cx="650" cy="280" rx="90" ry="50" class="usecase-ellipse"/>
  <text x="650" y="275" class="text-usecase">Déclarer</text>
  <text x="650" y="290" class="text-usecase">un Incident</text>
  <text x="650" y="305" class="text-usecase" font-size="11">(UC-002)</text>
  
  <!-- CAS D'UTILISATION 3: CONSULTER MES INCIDENTS -->
  <ellipse cx="450" cy="420" rx="90" ry="50" class="usecase-ellipse"/>
  <text x="450" y="410" class="text-usecase">Consulter</text>
  <text x="450" y="425" class="text-usecase">Mes Incidents</text>
  <text x="450" y="440" class="text-usecase" font-size="11">(UC-003)</text>
  
  <!-- CAS D'UTILISATION 4: CONSULTER DÉTAIL -->
  <ellipse cx="650" cy="550" rx="90" ry="50" class="usecase-ellipse"/>
  <text x="650" y="540" class="text-usecase">Consulter</text>
  <text x="650" y="555" class="text-usecase">Détail d'Incident</text>
  <text x="650" y="570" class="text-usecase" font-size="11">(UC-004)</text>
  
  <!-- CONNEXIONS ACTEUR - CAS D'UTILISATION -->
  <!-- Utilisateur -> S'Authentifier -->
  <line x1="130" y1="330" x2="380" y2="200" class="line-assoc" marker-end="url(#arrowAssoc)"/>
  
  <!-- Utilisateur -> Déclarer Incident -->
  <line x1="140" y1="340" x2="580" y2="300" class="line-assoc" marker-end="url(#arrowAssoc)"/>
  
  <!-- Utilisateur -> Consulter Mes Incidents -->
  <line x1="130" y1="370" x2="380" y2="420" class="line-assoc" marker-end="url(#arrowAssoc)"/>
  
  <!-- Utilisateur -> Consulter Détail -->
  <line x1="140" y1="380" x2="580" y2="540" class="line-assoc" marker-end="url(#arrowAssoc)"/>
  
  <!-- RELATIONS <<include>> -->
  <!-- S'Authentifier <<include>> Déclarer Incident -->
  <path d="M 480 230 Q 550 250 620 260" class="line-include"/>
  <text x="530" y="240" class="text-description" fill="#01579B">&lt;&lt;include&gt;&gt;</text>
  
  <!-- S'Authentifier <<include>> Consulter Mes Incidents -->
  <path d="M 430 230 Q 430 320 450 370" class="line-include"/>
  <text x="380" y="310" class="text-description" fill="#01579B">&lt;&lt;include&gt;&gt;</text>
  
  <!-- S'Authentifier <<include>> Consulter Détail -->
  <path d="M 500 220 Q 560 380 610 500" class="line-include"/>
  <text x="550" y="370" class="text-description" fill="#01579B">&lt;&lt;include&gt;&gt;</text>
  
  <!-- LÉGENDE -->
  <g>
    <!-- Boîte légende -->
    <rect x="20" y="730" width="350" height="60" fill="white" stroke="#999" stroke-width="1"/>
    
    <text x="30" y="745" class="text-note" font-weight="bold">LÉGENDE:</text>
    
    <!-- Acteur -->
    <circle cx="45" cy="760" r="8" class="actor-box"/>
    <text x="65" y="765" class="text-note">= Acteur (Utilisateur)</text>
    
    <!-- Cas d'utilisation -->
    <ellipse cx="215" cy="760" rx="12" ry="8" class="usecase-ellipse"/>
    <text x="235" y="765" class="text-note">= Cas d'Utilisation</text>
    
    <!-- Inclusion -->
    <line x1="30" y1="780" x2="60" y2="780" class="line-include"/>
    <text x="65" y="785" class="text-note">= Relation <<include>></text>
  </g>
  
  <!-- TABLEAU DES CAS -->
  <g>
    <rect x="380" y="730" width="800" height="60" fill="white" stroke="#999" stroke-width="1"/>
    
    <text x="390" y="745" class="text-note" font-weight="bold">RÉSUMÉ DES CAS:</text>
    
    <text x="390" y="760" class="text-note">UC-001: S'Authentifier | UC-002: Déclarer Incident | UC-003: Consulter Incidents | UC-004: Consulter Détail</text>
    
    <text x="390" y="775" class="text-note" font-style="italic">Tous les UC (sauf UC-001) requièrent un token valide généré lors de l'authentification</text>
  </g>
  
  <!-- ANNOTATIONS -->
  <g>
    <!-- Note sur S'Authentifier -->
    <rect x="280" y="80" width="180" height="70" fill="#FFF9E6" stroke="#F57F17" stroke-width="1" rx="3"/>
    <text x="290" y="95" class="text-note" font-weight="bold">UC-001</text>
    <text x="290" y="110" class="text-note">• Pré-req: compte valide</text>
    <text x="290" y="125" class="text-note">• Sortie: token UUID</text>
    <text x="290" y="140" class="text-note">• Max 3 tentatives</text>
  </g>
  
  <g>
    <!-- Note sur Déclarer Incident -->
    <rect x="650" y="80" width="180" height="70" fill="#E1F5FE" stroke="#01579B" stroke-width="1" rx="3"/>
    <text x="660" y="95" class="text-note" font-weight="bold">UC-002</text>
    <text x="660" y="110" class="text-note">• Champs: catégorie</text>
    <text x="660" y="125" class="text-note">  titre, description</text>
    <text x="660" y="140" class="text-note">• Sortie: ID unique, OPEN</text>
  </g>
</svg>

<!-- 
INSTRUCTIONS POUR UTILISER CE FICHIER:
1. Enregistrez ce code en tant que fichier .svg (ex: DiagrammeCasUtilisation.svg)
2. Ouvrez-le avec votre navigateur web (Chrome, Firefox, Edge, etc.)
3. Le diagramme s'affichera automatiquement
4. Vous pouvez l'exporter en PNG/PDF depuis le navigateur

CONTENU DU DIAGRAMME:
- Acteur: UTILISATEUR (à gauche)
- Système: HELP'OPS (au centre)
- 4 Cas d'Utilisation (UC-001 à UC-004)
- Relations d'inclusion (<<include>>)
- Légende et notes explicatives

RELATIONS:
- UC-001 (S'Authentifier) est le pré-requis de tous les autres
- UC-002, UC-003, UC-004 dépendent de UC-001
-->
